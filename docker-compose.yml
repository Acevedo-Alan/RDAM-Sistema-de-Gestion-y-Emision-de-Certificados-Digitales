services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: rdam_prod
      POSTGRES_USER: rdam_app_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rdam_app_user -d rdam_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file:                  # <--- LÍNEA MÁGICA: Inyecta todas las credenciales
      - .env                   
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/rdam_prod
      SPRING_DATASOURCE_USERNAME: rdam_app_user
      # Nota: JWT, PLUSPAGOS y SMTP ahora entran automáticamente por el .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pgdata: