<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F4A7C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#005EA2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2378C3;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Fondo con gradiente -->
  <rect width="64" height="64" fill="url(#bgGradient)" rx="8"/>
  <!-- Letra R blanca -->
  <text x="32" y="48" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="middle">R</text>
</svg>